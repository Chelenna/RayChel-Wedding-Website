<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap"
      rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: "#FFF8F0",
              blush: "#F5E6E0",
              gold: "#C9A96E",
              "gold-dark": "#A8834A",
              sage: "#9CAF88",
              "sage-dark": "#7A9166",
              charcoal: "#3D3D3D",
              "warm-gray": "#8C8279",
            },
            fontFamily: {
              serif: ["Cormorant Garamond", "serif"],
              sans: ["Montserrat", "sans-serif"],
              script: ["Great Vibes", "cursive"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-cream text-charcoal min-h-screen">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-10 sm:py-14">
      <div class="mb-8 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <!-- <a href="index.html" class="text-sm text-gold underline">← Back to wedding site</a> -->
          <h1 class="font-serif text-4xl sm:text-5xl mt-3">Photo Gallery</h1>
          <p class="font-sans text-sm text-warm-gray mt-2 max-w-2xl">A collection of our favorite moments.</p>
        </div>
      </div>

      <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/1.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/2.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/3.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/4.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/5.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/6.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/7.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/8.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
        <div class="overflow-hidden rounded-3xl bg-white shadow-lg">
          <img src="images/prenup/9.JPG" alt="Prenup photo" class="h-80 w-full object-cover" loading="lazy" decoding="async" />
        </div>
      </div>
    </div>
  </body>
</html>
